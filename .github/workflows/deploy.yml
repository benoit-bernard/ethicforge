name: Build and Deploy Blazor WASM

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-and-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup .NET SDK (try setup-dotnet)
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview
          global-json-file: ./global.json

      - name: Ensure .NET 10.0.201 is available (fallback installer)
        run: |
          set -euo pipefail
          echo "Available SDKs:" || true
          dotnet --list-sdks || true

          if ! dotnet --list-sdks 2>/dev/null | grep -q "^10\.0\."; then
            echo "Desired .NET 10 SDK not found. Installing dotnet 10.0.201 via dotnet-install.sh"
            curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
            chmod +x dotnet-install.sh
            ./dotnet-install.sh --version 10.0.201 --install-dir $HOME/dotnet --channel 10.0
            echo "$HOME/dotnet" >> $GITHUB_PATH
          else
            echo "A .NET 10 SDK is already installed."
          fi

      - name: Show installed .NET info
        run: dotnet --info

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore project
        run: dotnet restore EthicForge/EthicForge.csproj

      - name: Build project
        run: dotnet build EthicForge/EthicForge.csproj --configuration Release --no-restore

      - name: Run tests (if any)
        run: |
          set -e
          TEST=$(git ls-files "**/*Tests.csproj" "**/*Test*.csproj" | head -n 1 || true)
          if [ -n "$TEST" ]; then
            echo "Found test project: $TEST"
            dotnet test --no-build --verbosity normal
          else
            echo "No test project found, skipping tests."
          fi

      - name: Publish project
        run: dotnet publish EthicForge/EthicForge.csproj -c Release -o publish

      - name: Verify publish output
        run: |
          if [ ! -f publish/wwwroot/index.html ]; then
            echo "ERROR: publish/wwwroot/index.html not found" >&2
            ls -la publish || true
            exit 1
          fi

      - name: Create unversioned framework entries and 404 fallback
        run: |
          set -e
          echo "Listing _framework files:" || true
          ls -la publish/wwwroot/_framework || true

          # Copy versioned JS files to unversioned names expected by index.html/importmap
          # This ensures blazor.webassembly.js, dotnet.js, dotnet.runtime.js and dotnet.native.js exist
          for src in publish/wwwroot/_framework/blazor.webassembly.*.js; do
            if [ -f "$src" ]; then
              echo "Copying $src -> publish/wwwroot/_framework/blazor.webassembly.js"
              cp "$src" publish/wwwroot/_framework/blazor.webassembly.js || true
              break
            fi
          done

          for src in publish/wwwroot/_framework/dotnet.*.js; do
            if [ -f "$src" ]; then
              echo "Copying $src -> publish/wwwroot/_framework/dotnet.js"
              cp "$src" publish/wwwroot/_framework/dotnet.js || true
              break
            fi
          done

          for src in publish/wwwroot/_framework/dotnet.runtime.*.js; do
            if [ -f "$src" ]; then
              echo "Copying $src -> publish/wwwroot/_framework/dotnet.runtime.js"
              cp "$src" publish/wwwroot/_framework/dotnet.runtime.js || true
              break
            fi
          done

          for src in publish/wwwroot/_framework/dotnet.native.*.js; do
            if [ -f "$src" ]; then
              echo "Copying $src -> publish/wwwroot/_framework/dotnet.native.js"
              cp "$src" publish/wwwroot/_framework/dotnet.native.js || true
              break
            fi
          done

          # Ensure 404 fallback for SPA routing
          if [ -f publish/wwwroot/index.html ]; then
            cp publish/wwwroot/index.html publish/wwwroot/404.html || true
            echo "Copied index.html -> 404.html"
          fi

          echo "Publish tree:" || true
          ls -la publish/wwwroot || true

      - name: Deploy to GitHub Pages (public branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish/wwwroot
          publish_branch: public
          allow_empty_commit: false
          # keep_files=false will remove files on the target branch before publishing (clean behavior)
          keep_files: false
          # If your repository branch protection disallows pushes from GitHub Actions,
          # consider using a dedicated deploy key or allow GitHub Actions to push.
